{% extends 'base.html' %}
{% block content %}

<style>
    /* Estilos baseados na imagem de referência */
    .page-container {
        max-width: 800px;
        margin: 40px auto; /* Centraliza a coluna, mas o texto fica à esquerda */
        padding: 0 20px;
        font-family: sans-serif;
        color: #1f2937;
    }
    .page-title {
        font-size: 2.2rem;
        font-weight: 800;
        margin-bottom: 8px;
        color: #1f2937;
    }
    .breadcrumb {
        color: #4b5563;
        margin-bottom: 40px;
        font-size: 1rem;
    }
    .breadcrumb strong {
        color: #1f2937;
    }
    .form-group {
        margin-bottom: 25px;
    }
    .form-label {
        display: block;
        font-weight: 700;
        margin-bottom: 8px;
        font-size: 1rem;
        color: #1f2937;
    }
    /* Estiliza os inputs gerados pelo Django automaticamente */
    .form-group input[type="text"],
    .form-group input[type="password"],
    .form-group input[type="email"],
    .form-group input[type="number"],
    .form-group select,
    .form-group textarea {
        width: 100%;
        padding: 14px;
        border: 1px solid #1f2937; /* Borda escura igual à imagem */
        border-radius: 4px;
        font-size: 1rem;
        box-sizing: border-box;
        background-color: #fff;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
        outline: 2px solid #2563eb;
        border-color: transparent;
    }
    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 30px;
        font-size: 0.95rem;
    }
    .checkbox-group input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: #2563eb; /* Deixa o check azul */
    }
    .checkbox-group a {
        color: #2563eb; /* Azul dos links */
        text-decoration: underline;
        font-weight: 600;
    }
    .btn-primary {
        background-color: #2563eb; /* Azul do botão */
        color: #ffffff;
        border: none;
        padding: 14px 40px;
        font-size: 1rem;
        font-weight: 700;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.2s;
    }
    .btn-primary:hover {
        background-color: #1d4ed8;
    }
</style>

<div class="page-container">
    <h1 class="page-title">Fazer Cadastro</h1>
    <div class="breadcrumb">Login > <strong>Cadastro</strong></div>

    <form method="POST">
        {% csrf_token %}
        
        {% for field in form %}
            <div class="form-group">
                <label class="form-label">{{ field.label }} (Obrigatório)</label>
                {{ field }}
                {% if field.help_text %}
                    <small style="display: block; color: #6b7280; margin-top: 5px;">{{ field.help_text }}</small>
                {% endif %}
                {% for error in field.errors %}
                    <p style="color: #dc2626; font-size: 0.85rem; margin-top: 5px; font-weight: bold;">{{ error }}</p>
                {% endfor %}
            </div>
        {% endfor %}

        <div class="checkbox-group">
            <input type="checkbox" id="termos" name="termos" required>
            <label for="termos">Li e concordo com os <a href="#">termos de uso</a> e <a href="#">política de privacidade</a></label>
        </div>

        <button type="submit" class="btn-primary">Cadastrar</button>
    </form>
</div>
{% endblock %}
