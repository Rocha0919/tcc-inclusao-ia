{% extends 'base.html' %}
{% block content %}
<style>
    /* Estilos baseados na imagem de referência */
    .page-container {
        max-width: 800px;
        margin: 40px auto; /* Centraliza a coluna, mas o texto fica à esquerda */
        padding: 0 20px;
        font-family: sans-serif;
        color: #1f2937;
    }
    .page-title {
        font-size: 2.2rem;
        font-weight: 800;
        margin-bottom: 8px;
        color: #1f2937;
    }
    .breadcrumb {
        color: #4b5563;
        margin-bottom: 40px;
        font-size: 1rem;
    }
    .breadcrumb strong {
        color: #1f2937;
    }
    .form-group {
        margin-bottom: 25px;
    }
    .form-label {
        display: block;
        font-weight: 700;
        margin-bottom: 8px;
        font-size: 1rem;
        color: #1f2937;
    }
    /* Estiliza os inputs gerados pelo Django automaticamente */
    .form-group input[type="text"],
    .form-group input[type="password"],
    .form-group input[type="email"],
    .form-group input[type="number"],
    .form-group select,
    .form-group textarea {
        width: 100%;
        padding: 14px;
        border: 1px solid #1f2937; /* Borda escura igual à imagem */
        border-radius: 4px;
        font-size: 1rem;
        box-sizing: border-box;
        background-color: #fff;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
        outline: 2px solid #2563eb;
        border-color: transparent;
    }
    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 30px;
        font-size: 0.95rem;
    }
    .checkbox-group input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: #2563eb; /* Deixa o check azul */
    }
    .checkbox-group a {
        color: #2563eb; /* Azul dos links */
        text-decoration: underline;
        font-weight: 600;
    }
    .btn-primary {
        background-color: #2563eb; /* Azul do botão */
        color: #ffffff;
        border: none;
        padding: 14px 40px;
        font-size: 1rem;
        font-weight: 700;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.2s;
    }
    .btn-primary:hover {
        background-color: #1d4ed8;
    }
</style>
<div class="page-container">
    <h1 class="page-title">Atualizar Meu Perfil</h1>
    <div class="breadcrumb">Painel > <strong>Configurações</strong></div>
    
    <form method="POST">
        {% csrf_token %}
        
        <h3 style="font-size: 1.3rem; margin-bottom: 20px; margin-top: 30px; color: #1f2937;">1. Informações Principais</h3>
        
        <div class="form-group">
            <label class="form-label">Categoria da Deficiência</label>
            <select name="categoria_deficiencia" required>
                <option value="Física" {% if categoria_atual == 'Física' %}selected{% endif %}>Física / Motora</option>
                <option value="Visual" {% if categoria_atual == 'Visual' %}selected{% endif %}>Visual</option>
                <option value="Auditiva" {% if categoria_atual == 'Auditiva' %}selected{% endif %}>Auditiva</option>
                <option value="Intelectual" {% if categoria_atual == 'Intelectual' %}selected{% endif %}>Intelectual</option>
                <option value="TEA" {% if categoria_atual == 'TEA' %}selected{% endif %}>Transtorno do Espectro Autista (TEA)</option>
                <option value="TDAH" {% if categoria_atual == 'TDAH' %}selected{% endif %}>TDAH</option>
                <option value="Altas Habilidades" {% if categoria_atual == 'Altas Habilidades' %}selected{% endif %}>Altas Habilidades / Superdotação</option>
                <option value="Múltipla" {% if categoria_atual == 'Múltipla' %}selected{% endif %}>Múltipla</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Limitações Específicas</label>
            <textarea name="limitacoes_especificas" rows="3">{{ biologico.limitacoes_especificas }}</textarea>
        </div>

        <h3 style="font-size: 1.3rem; margin-bottom: 20px; margin-top: 40px; color: #1f2937;">2. Objetivos e Autonomia</h3>
        
        <div class="form-group">
            <label class="form-label">Qual o seu foco principal no momento?</label>
            <select name="objetivo_principal" required>
                <option value="estudo" {% if perfil_uso.objetivo_principal == 'estudo' %}selected{% endif %}>Estudo</option>
                <option value="trabalho" {% if perfil_uso.objetivo_principal == 'trabalho' %}selected{% endif %}>Trabalho</option>
                <option value="vida_diaria" {% if perfil_uso.objetivo_principal == 'vida_diaria' %}selected{% endif %}>Vida Diária e Autonomia</option>
                <option value="reabilitacao" {% if perfil_uso.objetivo_principal == 'reabilitacao' %}selected{% endif %}>Reabilitação</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Descreva as maiores barreiras no seu dia a dia</label>
            <textarea name="barreiras" rows="4" required>{{ perfil_uso.barreiras_dia_a_dia }}</textarea>
        </div>

        <h3 style="font-size: 1.3rem; margin-bottom: 20px; margin-top: 40px; color: #1f2937;">3. Perfil Tecnológico</h3>
        
        <div class="form-group" style="margin-bottom: 40px;">
            <label class="form-label">Nível de afinidade com tecnologia</label>
            <select name="nivel_tecnologico">
                <option value="Básico" {% if tecnologico.nivel_tecnologico == 'Básico' %}selected{% endif %}>Básico (Tenho dificuldades)</option>
                <option value="Intermediário" {% if tecnologico.nivel_tecnologico == 'Intermediário' %}selected{% endif %}>Intermediário (Me viro bem)</option>
                <option value="Avançado" {% if tecnologico.nivel_tecnologico == 'Avançado' %}selected{% endif %}>Avançado (Tenho facilidade)</option>
            </select>
        </div>

        <button type="submit" class="btn-primary">Salvar Alterações</button>
    </form>
</div>
{% endblock %}
