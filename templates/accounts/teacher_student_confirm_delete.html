{% extends 'base.html' %}
{% block content %}
<section class="confirm-shell">
    <div class="confirm-card">
        <div class="confirm-header">
            <a href="{% url 'teacher_student_detail' student_profile.id %}" class="page-back-link">&larr; Voltar ao perfil</a>
            <span class="eyebrow">Ação sensível</span>
            <h1 class="confirm-title">Excluir aluno</h1>
            <p class="confirm-copy">
                Tem certeza de que deseja excluir o perfil de <strong>{{ student_profile.display_name }}</strong>?
                As recomendações e avaliações associadas a esse perfil também serão removidas.
            </p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="confirm-actions">
                <a href="{% url 'teacher_student_detail' student_profile.id %}" class="btn btn-soft">Cancelar</a>
                <button type="submit" class="btn btn-danger">Confirmar exclusão</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
