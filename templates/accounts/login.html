{% extends 'base.html' %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; padding-top: 40px;">
    <div class="card" style="width: 100%; max-width: 400px; padding: 30px;">
        <h2 style="margin-bottom: 20px; color: var(--primary); text-align: center;">Acessar Conta</h2>
        
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 5px;">{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; padding: 12px;">Entrar</button>
        </form>
        
        <p style="margin-top: 20px; text-align: center; font-size: 0.95rem;">
            Ainda não tem conta? <a href="{% url 'signup' %}" style="color: var(--primary); font-weight: bold;">Cadastre-se aqui</a>
        </p>
    </div>
</div>
{% endblock %}
