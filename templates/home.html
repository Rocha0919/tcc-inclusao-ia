{% extends 'base.html' %}
{% block content %}

<style>
    .hero-wrapper {
        display: grid;
        grid-template-columns: 1.4fr 0.6fr; /* Aumentei ainda mais o espaço do texto */
        align-items: center;
        padding: 80px 0;
        min-height: 550px;
        max-width: 1200px;
        margin: 0 auto;
    }

    .hero-text {
        z-index: 10;
    }

    .hero-text h1 {
        font-size: 3.3rem; 
        line-height: 1.1;
        color: #1a202c;
        margin-bottom: 24px;
        font-weight: 800;
        white-space: nowrap; 
    }

    .hero-text h1 span.text-blue { color: #1a56db; }

    .hero-text p {
        font-size: 1.1rem;
        color: #4a5568;
        margin-bottom: 45px;
        max-width: 500px;
        line-height: 1.6;
    }

    .btn-solid {
        background-color: #1a56db;
        color: white;
        padding: 16px 32px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: bold;
        font-size: 1.1rem;
        display: inline-block;
        transition: 0.3s;
    }

    /* --- COMPOSIÇÃO DESEMBOLADA --- */
    .hero-visuals {
        position: relative;
        height: 400px;
        width: 100%;
        display: flex;
        justify-content: flex-end; /* Garante que o grupo fique na direita */
    }

    .shapes-container {
        position: relative;
        width: 400px; /* Largura fixa para o grupo de formas */
        height: 100%;
    }

    .shape {
        background-color: #e2e8f0;
        border-radius: 40px;
        position: absolute;
    }

    /* Quadrado Superior - Mais isolado no topo */
    .shape-top {
        width: 180px;
        height: 180px;
        top: -20px;
        right: 160px; /* Distância da borda direita */
        z-index: 1;
    }

    /* Retângulo Principal - Centralizado e mais largo */
    .shape-main {
        width: 320px;
        height: 200px;
        bottom: 20px;
        right: 80px;
        z-index: 3;
    }

    /* Quadrado da Direita - O que fica mais na ponta de fora */
    .shape-right {
        width: 180px;
        height: 180px;
        right: -20px;
        top: 60px;
        z-index: 2;
    }

    @media (max-width: 1100px) {
        .hero-text h1 { white-space: normal; font-size: 2.8rem; }
        .hero-wrapper { grid-template-columns: 1fr; text-align: center; }
        .hero-visuals { justify-content: center; margin-top: 50px; }
        .shapes-container { transform: scale(0.8); }
    }
</style>

<section class="hero-wrapper">
    <div class="hero-text">
        <h1>Tecnologia assistiva <br><span class="text-blue">personalizada</span></h1>
        <p>Recomendações inteligentes baseadas no perfil, necessidades e contexto de cada usuário.</p>
        
        <div class="hero-buttons">
            {% if not user.is_authenticated %}
                <a href="{% url 'signup' %}" class="btn-solid">Criar Conta e Começar</a>
            {% else %}
                <a href="{% url 'profile_detail' %}" class="btn-solid">Recomendação (Meu Painel)</a>
            {% endif %}
        </div>
    </div>

    <div class="hero-visuals">
        <div class="shapes-container">
            <div class="shape shape-top"></div>
            <div class="shape shape-main"></div>
            <div class="shape shape-right"></div>
        </div>
    </div>
</section>

{% endblock %}
