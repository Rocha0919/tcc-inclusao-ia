{% extends 'base.html' %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: flex-start; padding-top: 40px;">
    <div class="card" style="width: 100%; max-width: 500px; padding: 30px;">
        <h2 style="color: var(--primary); text-align: center; margin-bottom: 15px;">Editar Avaliação</h2>
        
        <p style="text-align: center; margin-bottom: 25px; color: #555; font-size: 0.95rem;">
            Atualizando sua avaliação sobre:<br>
            <strong style="color: var(--primary); font-size: 1.1rem;">{{ feedback.resource.name }}</strong>
        </p>

        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px; color: #333;">Nota (1 a 5):</label>
                <input type="number" name="score" min="1" max="5" value="{{ feedback.score }}" required 
                       style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: var(--border-radius); font-size: 1rem;">
            </div>

            <div class="form-group" style="margin-bottom: 25px;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px; color: #333;">Seu Comentário (opcional):</label>
                <textarea name="user_comment" rows="4" 
                          style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: var(--border-radius); font-size: 1rem; resize: vertical;">{{ feedback.user_comment|default_if_none:'' }}</textarea>
            </div>

            <div style="display: flex; gap: 15px;">
                <a href="{% url 'feedback_history' %}" class="btn btn-outline" style="flex: 1; text-align: center; color: #555; border-color: #ccc;">Cancelar</a>
                
                <button type="submit" class="btn btn-primary" style="flex: 1;">Salvar Alterações</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
